<!DOCTYPE html>
<html lang ='en'>
<head>
    <title> JAVASCRIPT </title>
</head>
<body>
    <h2> Java Script </h2>
</body>
<script>
    //JavaScript variables are containers for storing data values, which can be declared using 
    // the keywords var, let, or const. Modern JavaScript development primarily uses let and 
    // const for their clearer scoping rules. 

    // using var keyword
    var myName="Apoorva Jaiswal";

    //In JavaScript, the document is a global object that represents the entire web page (HTML document) loaded in the browser window
    document.write(myName); //Output on browser
    console.log(myName);

    //JS Execution and Scope in JS (Global and Local[block])
    function hello(){

    
       var msg="Thanks for Visiting!";
       console.log(msg);
    }
    hello();

    // variable declaration using let and const 
    let myRollNo="2025B01010332"
    console.log(myRollNo);

    myRollNo="2025B01010333"    //no redeclare but can reassign
    console.log(myRollNo);

    const myPhoneNo="9555750486"
    console.log(myPhoneNo);

    //myPhoneNo="7355902175"  // no redeclare no reassign
    //console.log(myPhoneNo);



</script>
</html>
